# Docker Compose Configuration - QuickBill Desk
# @description Container orchestration for development and production
# @version 1.0.0

version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: quickbill_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: quickbill
    volumes:
      - quickbill_mongodb_data:/data/db
    command: mongod --quiet --logpath /dev/null

volumes:
  quickbill_mongodb_data:
    name: quickbill_mongodb_data
